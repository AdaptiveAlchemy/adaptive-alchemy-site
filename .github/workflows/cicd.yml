name: CI Build Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run full workflow or only build & deploy'
        required: true
        default: full
        type: choice
        options:
          - full
          - build_deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Quality Gates
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.run_mode == 'full'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm lint:format:src && pnpm lint:format:css

      # .astro/ is gitignored; type-aware ESLint needs astro:content types before lint.
      - name: Astro sync
        run: pnpm exec astro sync

      - name: Lint code
        run: pnpm lint:code:src

      - name: Lint styles
        run: pnpm lint:styles

      - name: Lint markdown
        run: pnpm lint:md

      - name: Lint workflow files
        run: |
          curl -sfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash | bash -s -- 1.7.12
          ./actionlint -color .github/workflows/*.yml

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level high

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'workflow_dispatch' || inputs.run_mode == 'full'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lighthouse CI
        run: pnpm lighthouse

  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    needs:
      - ci
      - lighthouse
    if: |
      always() &&
      (
        github.event_name == 'push' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (
            inputs.run_mode == 'build_deploy' ||
            (
              inputs.run_mode == 'full' &&
              needs.ci.result == 'success' &&
              needs.lighthouse.result == 'success'
            )
          )
        )
      )
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
