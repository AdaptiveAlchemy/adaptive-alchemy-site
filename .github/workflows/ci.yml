name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm lint:format:src && pnpm lint:format:css

      - name: Lint code
        run: pnpm lint:code:src

      - name: Lint styles
        run: pnpm lint:styles

      - name: Lint markdown
        run: pnpm lint:md

      - name: Lint workflow files
        uses: rhysd/actionlint@v1

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level high

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lighthouse CI
        run: pnpm lighthouse
